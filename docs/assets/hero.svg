<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>
    <!-- Accent bar gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1565c0"/>
      <stop offset="50%"  stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e2636"/>
      <stop offset="100%" stop-color="#161c2a"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="280" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="70"  x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="225" y1="0" x2="225" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="675" y1="0" x2="675" y2="280"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="280" rx="2" fill="url(#accent)"/>

  <!-- Top accent line -->
  <rect x="5" y="0" width="895" height="3" fill="url(#accent)" opacity="0.6"/>

  <!-- MkDocs logo mark (stylised M) -->
  <g transform="translate(44, 90)" filter="url(#glow)">
    <rect width="58" height="58" rx="10" fill="#1565c0" opacity="0.9"/>
    <text x="10" y="44" font-size="38" font-weight="800" fill="#ffffff" font-family="monospace">M</text>
  </g>

  <!-- Arrow connector -->
  <g transform="translate(114, 116)" fill="none" stroke="#00b4d8" stroke-width="2.5" opacity="0.8">
    <line x1="0" y1="0" x2="28" y2="0"/>
    <polyline points="22,-6 28,0 22,6"/>
  </g>

  <!-- Confluence logo mark (stylised C) -->
  <g transform="translate(154, 90)" filter="url(#glow)">
    <rect width="58" height="58" rx="10" fill="#0077b6" opacity="0.9"/>
    <text x="9" y="44" font-size="36" font-weight="800" fill="#ffffff" font-family="monospace">C</text>
  </g>

  <!-- Main title -->
  <text x="238" y="128" font-size="30" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">
    MkDocs <tspan fill="#00b4d8">→</tspan> Confluence
  </text>

  <!-- Subtitle -->
  <text x="238" y="158" font-size="14" fill="#8b949e" letter-spacing="0.2">
    Publish your docs automatically. Zero friction.
  </text>

  <!-- Divider -->
  <line x1="44" y1="184" x2="856" y2="184" stroke="#30363d" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Pill helper: each is a rounded rect + text -->

  <!-- Admonitions -->
  <rect x="44"  y="200" width="115" height="28" rx="6" fill="#1e2636" stroke="#1565c0" stroke-width="1"/>
  <text x="101" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">⚡ Admonitions</text>

  <!-- Code blocks -->
  <rect x="170" y="200" width="115" height="28" rx="6" fill="#1e2636" stroke="#0077b6" stroke-width="1"/>
  <text x="227" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">💻 Code blocks</text>

  <!-- Mermaid -->
  <rect x="296" y="200" width="100" height="28" rx="6" fill="#1e2636" stroke="#00b4d8" stroke-width="1"/>
  <text x="346" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">🧜 Mermaid</text>

  <!-- Tabs -->
  <rect x="407" y="200" width="82" height="28" rx="6" fill="#1e2636" stroke="#1565c0" stroke-width="1"/>
  <text x="448" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">📑 Tabs</text>

  <!-- Task lists -->
  <rect x="500" y="200" width="100" height="28" rx="6" fill="#1e2636" stroke="#0077b6" stroke-width="1"/>
  <text x="550" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">✅ Task lists</text>

  <!-- TOC -->
  <rect x="611" y="200" width="68" height="28" rx="6" fill="#1e2636" stroke="#00b4d8" stroke-width="1"/>
  <text x="645" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">📋 TOC</text>

  <!-- Anchors -->
  <rect x="690" y="200" width="80" height="28" rx="6" fill="#1e2636" stroke="#1565c0" stroke-width="1"/>
  <text x="730" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">⚓ Anchors</text>

  <!-- Dry-run -->
  <rect x="781" y="200" width="75" height="28" rx="6" fill="#1e2636" stroke="#0077b6" stroke-width="1"/>
  <text x="818" y="219" font-size="11.5" fill="#79c0ff" text-anchor="middle">🔍 Dry run</text>

  <!-- Corner version tag -->
  <text x="856" y="30" font-size="11" fill="#484f58" text-anchor="end">polarpoint-io</text>
</svg>
