name: 'Python CI'

on:
  push:
    branches:
      - main
      - "release/*"
  workflow_dispatch:
  workflow_call:
    inputs:
      python_version:
          description: "Version of python language. Default 3.11"
          type: string
          required: false
          default: "3.11"
      source_dir:
          description: "directory the source code is in"
          type: string
          required: false
          default: "src"
      tests_dir:
        required: false
        default: "tests"
        type: string

jobs:
  publish:
    name: 'Publish to PyPI'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x


      - name: Install dependencies from pyproject.toml
        run: |
            python -m pip install --upgrade pip wheel setuptools black
            pip install --prefer-binary .  # Prefer binary wheels to avoid source build errors

      - name: Format code with Black
        run: black --check --diff ${{ inputs.source_dir }} || echo "Formatting issues found, see diff above"

      - name: Commit Black Changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: code formatting with Black"
          file_pattern: "**/*.py"  
          branch: ${{ github.ref }}  

      - name: Run Tests with Pytest and Generate Coverage
        run: |
          coverage run -m pytest --maxfail=1 --disable-warnings -q
          coverage xml          

      - name: Semantic Release PyPI
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: "semantic-release-pypi  @semantic-release/exec"
        env:
          GH_TOKEN: ${{ secrets.POL_GH_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_USERNAME: "__token__"
          PYPI_REPO_URL: "https://upload.pypi.org/legacy/"
